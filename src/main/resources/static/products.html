<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cửa hàng – CauLongVui</title>
  <meta name="description" content="Mua sắm dụng cụ cầu lông chính hãng tại CauLongVui: vợt, cầu, giày, túi và phụ kiện." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/header-footer.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- ── NAVBAR ── -->
<div id="header-placeholder"></div>

<!-- ── PAGE HERO ── -->
<div class="page-hero">
  <h1>🛒 Cửa hàng Dụng cụ Cầu lông</h1>
  <p>Vợt, cầu, giày và phụ kiện từ các thương hiệu uy tín. Hàng chính hãng, giá tốt nhất.</p>
</div>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <div class="search-input-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-input" type="text" class="form-control" placeholder="Tìm sản phẩm..." autocomplete="off" />
  </div>
  <select id="filter-category" class="form-control" style="max-width:200px;">
    <option value="">Tất cả danh mục</option>
  </select>
  <button class="btn btn-secondary btn-sm" onclick="loadProducts()">🔄 Làm mới</button>
</div>

<!-- ── PRODUCTS GRID ── -->
<div class="section" style="padding-top:2rem;">
  <div class="grid-4" id="products-grid">
    <!-- Rendered by products.js -->
  </div>
</div>

<!-- ── FOOTER ── -->
<div id="footer-placeholder"></div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script src="/js/products.js"></script>
</body>
</html>
