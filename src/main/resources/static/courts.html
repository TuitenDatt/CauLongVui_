<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt sân – CauLongVui</title>
  <meta name="description" content="Xem danh sách sân cầu lông và đặt sân trực tuyến tại CauLongVui." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/header-footer.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- ── NAVBAR ── -->
<div id="header-placeholder"></div>

<!-- ── PAGE HERO ── -->
<div class="page-hero">
  <h1>🏸 Danh sách Sân Cầu Lông</h1>
  <p>Chọn sân và đặt lịch trực tuyến. Hệ thống tự động kiểm tra slot trống và tính giá.</p>
</div>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <div class="filter-group">
    <label>🔍 Tìm tên sân</label>
    <input id="search-input" type="text" class="form-control" placeholder="Nhập tên sân..." autocomplete="off" />
  </div>
  
  <div class="filter-group">
    <label>📅 Ngày đặt</label>
    <input id="search-date" type="date" class="form-control" />
  </div>

  <div class="filter-group">
    <label>📊 Trạng thái</label>
    <select id="filter-status" class="form-control">
      <option value="">Tất cả trạng thái</option>
      <option value="AVAILABLE">🟢 Còn trống</option>
      <option value="BOOKED">🟡 Đã đặt</option>
      <option value="MAINTENANCE">🔴 Bảo trì</option>
    </select>
  </div>

  <button class="btn-search-main" onclick="applyFilters()">
    <span class="icon">🔍</span> Tìm sân
  </button>
</div>

<!-- ── COURTS GRID ── -->
<div class="section" style="padding-top:2rem;">
  <div class="grid-3" id="courts-grid">
    <!-- Rendered by courts.js -->
  </div>
</div>

<!-- ── BOOKING MODAL ── -->
<div class="modal-overlay" id="booking-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>📅 Đặt sân cầu lông</h3>
      <button class="modal-close" id="close-modal">✕</button>
    </div>
    <div id="booking-court-info"></div>
    <form id="booking-form" novalidate>
      <input type="hidden" id="booking-court-id" />
      <div class="form-row">
        <div class="form-group">
          <label for="customer-name">Họ và tên *</label>
          <input id="customer-name" type="text" class="form-control" placeholder="Nguyễn Văn A" required />
        </div>
        <div class="form-group">
          <label for="customer-phone">Số điện thoại *</label>
          <input id="customer-phone" type="tel" class="form-control" placeholder="0901 234 567" required />
        </div>
      </div>
      <div class="form-group">
        <label for="booking-date">Ngày đặt *</label>
        <input id="booking-date" type="date" class="form-control" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="start-time">Giờ bắt đầu *</label>
          <input id="start-time" type="time" class="form-control" value="07:00" required />
        </div>
        <div class="form-group">
          <label for="end-time">Giờ kết thúc *</label>
          <input id="end-time" type="time" class="form-control" value="08:00" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
        📅 Xác nhận đặt sân
      </button>
    </form>
  </div>
</div>

<!-- ── FOOTER ── -->
<div id="footer-placeholder"></div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script src="/js/courts.js"></script>
</body>
</html>
