<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách sân cầu lông – Cầu Lông Vui</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="description" content="Xem danh sách sân cầu lông và đặt sân trực tuyến tại CauLongVui." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/header-footer.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- ── NAVBAR ── -->
<div id="header-placeholder"></div>

<!-- ── PAGE HERO ── -->
<div class="page-hero">
  <h1>Danh sách Sân Cầu Lông</h1>
  <p>Chọn sân và đặt lịch trực tuyến. Hệ thống tự động kiểm tra slot trống và tính giá.</p>
</div>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <div class="filter-group">
    <label>Tìm tên sân</label>
    <input id="search-input" type="text" class="form-control" placeholder="Nhập tên sân..." autocomplete="off" />
  </div>
  
  <div class="filter-group">
    <label>Ngày đặt</label>
    <input id="search-date" type="date" class="form-control" />
  </div>

  <div class="filter-group">
    <label>Trạng thái</label>
    <select id="filter-status" class="form-control">
      <option value="">Tất cả trạng thái</option>
      <option value="AVAILABLE">Còn trống</option>
      <option value="BOOKED">Đã đặt</option>
      <option value="MAINTENANCE">Bảo trì</option>
    </select>
  </div>

  <button class="btn-search-main" onclick="applyFilters()">Tìm sân</button>
</div>

<!-- ── COURTS GRID ── -->
<div class="section">
  <div class="grid-3" id="courts-grid">
    <!-- Rendered by courts.js -->
  </div>
</div>

<!-- Booking modal đã được chuyển sang trang schedule.html (Chọn giờ trực quan) -->

<!-- ── FOOTER ── -->
<div id="footer-placeholder"></div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script src="/js/courts.js"></script>
</body>
</html>
