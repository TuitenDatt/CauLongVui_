<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Booking – Cầu Lông Vui</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/header-footer.css" />
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); }
    .mgmt-page { padding: 90px 0 60px; min-height: 100vh; }
    .mgmt-container { max-width: 1300px; margin: 0 auto; padding: 0 24px; }

    /* Header */
    .mgmt-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
    .mgmt-title  { font-size: 26px; font-weight: 900; color: var(--dark); }
    .mgmt-title span { color: var(--green); }
    .breadcrumb  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .breadcrumb a { color: var(--green); text-decoration: none; }

    /* Stats */
    .stats-bar { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
    .stat-chip {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px; font-size: 13px;
      font-weight: 600; color: var(--dark); display: flex; align-items: center; gap: 8px;
    }
    .stat-chip .val { font-size: 22px; font-weight: 900; }
    .val-pending   { color: #f59e0b; }
    .val-confirmed { color: #16a34a; }
    .val-cancelled { color: #dc2626; }
    .val-completed { color: #64748b; }

    /* Toolbar */
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
    .search-wrap { position: relative; }
    .search-wrap::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; }
    .toolbar input[type="text"], .toolbar input[type="date"] {
      padding: 10px 14px 10px 38px; min-width: 200px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; outline: none; background: var(--white); font-family: inherit;
    }
    .toolbar input[type="date"] { padding-left: 14px; }
    .toolbar input:focus { border-color: var(--green); }
    .toolbar select {
      padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; background: var(--white);
      font-family: inherit; outline: none; cursor: pointer;
    }
    .toolbar select:focus { border-color: var(--green); }
    .btn-refresh {
      background: var(--green); color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .btn-refresh:hover { background: #14532d; }

    /* Table */
    .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8f9fa; }
    th { padding: 14px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    td { padding: 13px 16px; font-size: 14px; color: var(--dark); border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8fffe; }

    /* Status badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-PENDING   { background: #fef3c7; color: #92400e; }
    .badge-CONFIRMED { background: #dcfce7; color: #15803d; }
    .badge-CANCELLED { background: #fee2e2; color: #b91c1c; }
    .badge-COMPLETED { background: #f1f5f9; color: #64748b; }

    /* Action buttons */
    .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-confirm { background: #dcfce7; color: #15803d; border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; }
    .btn-confirm:hover { background: #15803d; color: #fff; }
    .btn-cancel2 { background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; }
    .btn-cancel2:hover { background: #dc2626; color: #fff; }
    .btn-complete { background: #e0e7ff; color: #4338ca; border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; }
    .btn-complete:hover { background: #4338ca; color: #fff; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); font-size: 14px; }

    /* Spinner */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Access denied */
    .access-denied { text-align: center; padding: 120px 24px; }

    /* Pass san badge */
    .pass-badge { background: #fef9c3; color: #a16207; font-size: 10px; padding: 2px 6px; border-radius: 8px; border: 1px solid #fde047; margin-left: 4px; font-weight: 700; }

    /* Price */
    .price-cell { font-weight: 700; color: var(--green); }
  </style>
</head>
<body>
<div id="header-placeholder"></div>

<!-- Access Denied -->
<div id="accessDenied" style="display:none;" class="mgmt-page">
  <div class="access-denied">
    <div style="font-size:64px">🚫</div>
    <h2>Không có quyền truy cập</h2>
    <p>Trang này chỉ dành cho Quản trị viên và Nhân viên.</p>
    <a href="/auth/login.html" class="btn-refresh" style="display:inline-block;margin-top:20px;text-decoration:none;">Đăng nhập</a>
  </div>
</div>

<!-- Main -->
<div id="mgmtPage" style="display:none;" class="mgmt-page">
  <div class="mgmt-container">

    <div class="mgmt-header">
      <div>
        <div class="breadcrumb"><a href="/admin/admin.html">⚙️ Quản trị</a> › Quản lý Booking</div>
        <h1 class="mgmt-title">📅 Quản lý <span>Lịch Đặt Sân</span></h1>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-chip"><span class="val val-pending"  id="sPending">—</span> Chờ xác nhận</div>
      <div class="stat-chip"><span class="val val-confirmed" id="sConfirmed">—</span> Đã xác nhận</div>
      <div class="stat-chip"><span class="val val-completed" id="sCompleted">—</span> Hoàn thành</div>
      <div class="stat-chip"><span class="val val-cancelled" id="sCancelled">—</span> Đã hủy</div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Tìm tên, SĐT, sân..." oninput="applyFilter()" />
      </div>
      <input type="date" id="dateFilter" onchange="applyFilter()" title="Lọc theo ngày" />
      <select id="statusFilter" onchange="applyFilter()">
        <option value="">Tất cả trạng thái</option>
        <option value="PENDING">Chờ xác nhận</option>
        <option value="CONFIRMED">Đã xác nhận</option>
        <option value="COMPLETED">Hoàn thành</option>
        <option value="CANCELLED">Đã hủy</option>
      </select>
      <button class="btn-refresh" onclick="loadBookings()">🔄 Làm mới</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Sân</th>
            <th>Khách hàng</th>
            <th>Ngày đặt</th>
            <th>Khung giờ</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
            <th style="min-width:180px;">Thao tác</th>
          </tr>
        </thead>
        <tbody id="bookingTableBody">
          <tr><td colspan="8"><div class="empty-state"><div class="icon">⏳</div><p>Đang tải dữ liệu...</p></div></td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<div id="footer-placeholder"></div>
<div id="toast-container"></div>

<script src="/js/app.js"></script>
<script>
let allBookings = [];

/* ── Init ────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  const user = getCurrentUser();
  if (!user || (user.role !== 'ADMIN' && user.role !== 'STAFF')) {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }
  document.getElementById('mgmtPage').style.display = 'block';
  // Set date filter to today
  document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
  await loadBookings();
});

/* ── Load ─────────────────────────────────────────────── */
async function loadBookings() {
  const tbody = document.getElementById('bookingTableBody');
  tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">⏳</div><p>Đang tải...</p></div></td></tr>`;
  try {
    const res  = await fetch('/api/bookings');
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    allBookings = json.data || [];
    updateStats(allBookings);
    applyFilter();
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">⚠️</div><h3>Không thể tải dữ liệu</h3><p>${esc(err.message)}</p></div></td></tr>`;
    showToast('Lỗi: ' + err.message, 'error');
  }
}

function updateStats(data) {
  document.getElementById('sPending').textContent   = data.filter(b => b.status === 'PENDING').length;
  document.getElementById('sConfirmed').textContent = data.filter(b => b.status === 'CONFIRMED').length;
  document.getElementById('sCompleted').textContent = data.filter(b => b.status === 'COMPLETED').length;
  document.getElementById('sCancelled').textContent = data.filter(b => b.status === 'CANCELLED').length;
}

/* ── Filter ───────────────────────────────────────────── */
function applyFilter() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const date   = document.getElementById('dateFilter').value;
  const status = document.getElementById('statusFilter').value;

  let filtered = allBookings;
  if (status) filtered = filtered.filter(b => b.status === status);
  if (date)   filtered = filtered.filter(b => b.bookingDate === date);
  if (search) filtered = filtered.filter(b =>
    (b.courtName      || '').toLowerCase().includes(search) ||
    (b.customerName   || '').toLowerCase().includes(search) ||
    (b.customerPhone  || '').includes(search)
  );

  // Sort: newest first
  filtered = [...filtered].sort((a, b) =>
    (b.bookingDate + b.startTime).localeCompare(a.bookingDate + a.startTime)
  );

  renderTable(filtered);
}

/* ── Render ───────────────────────────────────────────── */
function renderTable(bookings) {
  const tbody = document.getElementById('bookingTableBody');
  if (!bookings.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">📅</div><h3>Không có booking</h3><p>Thử thay đổi bộ lọc.</p></div></td></tr>`;
    return;
  }

  const statusLabel = { PENDING: 'Chờ XN', CONFIRMED: 'Đã xác nhận', CANCELLED: 'Đã hủy', COMPLETED: 'Hoàn thành' };

  tbody.innerHTML = bookings.map((b, idx) => {
    const now     = new Date();
    const startDT = new Date(b.bookingDate + 'T' + b.startTime);
    const endDT   = new Date(b.bookingDate + 'T' + b.endTime);
    let timePill  = '';
    if (b.status !== 'CANCELLED' && b.status !== 'COMPLETED') {
      if (now < startDT)             timePill = '<span style="font-size:10px;background:#fff7ed;color:#ea580c;padding:2px 6px;border-radius:8px;margin-left:4px;">Sắp tới</span>';
      else if (now >= startDT && now <= endDT) timePill = '<span style="font-size:10px;background:#dcfce7;color:#16a34a;padding:2px 6px;border-radius:8px;margin-left:4px;">Đang đánh</span>';
    }

    const canConfirm  = b.status === 'PENDING';
    const canComplete = b.status === 'CONFIRMED';
    const canCancel   = b.status === 'PENDING' || b.status === 'CONFIRMED';

    return `<tr>
      <td style="color:var(--muted);font-size:12px;">#${b.id}</td>
      <td>
        <div style="font-weight:700;">${esc(b.courtName || '—')}</div>
        ${b.isPass ? '<span class="pass-badge">Pass Sân</span>' : ''}
      </td>
      <td>
        <div style="font-weight:600;">${esc(b.customerName || '—')}</div>
        <div style="font-size:12px;color:var(--muted);">${esc(b.customerPhone || '—')}</div>
      </td>
      <td>${esc(b.bookingDate || '—')}</td>
      <td>${esc(b.startTime || '—')} – ${esc(b.endTime || '—')}${timePill}</td>
      <td class="price-cell">${b.totalPrice ? b.totalPrice.toLocaleString('vi-VN') + ' đ' : '—'}</td>
      <td><span class="badge badge-${b.status}">${statusLabel[b.status] || b.status}</span></td>
      <td>
        <div class="action-btns">
          ${canConfirm  ? `<button class="btn-confirm"  onclick="updateStatus(${b.id},'CONFIRMED')">✅ Xác nhận</button>` : ''}
          ${canComplete ? `<button class="btn-complete" onclick="updateStatus(${b.id},'COMPLETED')">🏁 Hoàn thành</button>` : ''}
          ${canCancel   ? `<button class="btn-cancel2"  onclick="cancelBookingAdmin(${b.id})">🚫 Hủy</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

/* ── Actions ──────────────────────────────────────────── */
async function updateStatus(id, status) {
  const labels = { CONFIRMED: 'xác nhận', COMPLETED: 'hoàn thành' };
  try {
    const res  = await fetch(`/api/bookings/${id}/status?status=${status}`, { method: 'PATCH' });
    const json = await res.json();
    if (!res.ok || !json.success) throw new Error(json.message);
    showToast(`✅ Đã ${labels[status] || status} booking #${id}!`, 'success');
    await loadBookings();
  } catch (err) {
    showToast('❌ Lỗi: ' + err.message, 'error');
  }
}

async function cancelBookingAdmin(id) {
  const b = allBookings.find(x => x.id === id);
  if (!confirm(`Hủy booking #${id}?\nSân: ${b?.courtName}\nKhách: ${b?.customerName}\n\nXác nhận?`)) return;
  try {
    const res  = await fetch(`/api/bookings/${id}/status?status=CANCELLED`, { method: 'PATCH' });
    const json = await res.json();
    if (!res.ok || !json.success) throw new Error(json.message);
    showToast(`🚫 Đã hủy booking #${id}!`, 'success');
    await loadBookings();
  } catch (err) {
    showToast('❌ Lỗi: ' + err.message, 'error');
  }
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
