<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gói Hội Viên — Cầu Lông Vui</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/header-footer.css" />
  <style>
    .membership-page { padding: 120px 24px 80px; max-width: 1200px; margin: 0 auto; min-height: 80vh; }
    .page-header { text-align: center; margin-bottom: 60px; }
    .page-title { font-size: 36px; font-weight: 900; color: var(--dark); margin-bottom: 12px; letter-spacing: -1px; }
    .page-sub { font-size: 16px; color: var(--muted); max-width: 600px; margin: 0 auto; }

    .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; margin-top: 40px; }
    
    .plan-card {
      background: var(--white); border-radius: 24px; padding: 40px;
      border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }
    .plan-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); border-color: var(--green); }
    .plan-card.popular { border: 2px solid var(--green); transform: scale(1.03); z-index: 1; }
    .plan-card.popular:hover { transform: scale(1.03) translateY(-8px); }
    .plan-card.current-plan { border: 2px solid #888; opacity: 0.75; }
    .plan-card.current-plan:hover { transform: none; box-shadow: none; border-color: #888; }
    
    .popular-tag {
      position: absolute; top: 0; right: 0; background: var(--green); color: #fff;
      font-size: 11px; font-weight: 800; padding: 8px 20px; border-radius: 0 0 0 12px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .current-tag {
      position: absolute; top: 0; right: 0; background: #888; color: #fff;
      font-size: 11px; font-weight: 800; padding: 8px 20px; border-radius: 0 0 0 12px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .plan-name { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .plan-tier { font-size: 12px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; display: block; }
    
    .plan-price { margin-bottom: 32px; display: flex; align-items: baseline; gap: 4px; }
    .price-val { font-size: 40px; font-weight: 900; color: var(--dark); letter-spacing: -1px; }
    .price-unit { color: var(--muted); font-weight: 500; font-size: 15px; }

    .plan-features { list-style: none; margin-bottom: 40px; flex: 1; }
    .plan-features li {
      display: flex; align-items: flex-start; gap: 12px; font-size: 15px;
      color: var(--text); margin-bottom: 16px; line-height: 1.4;
    }
    .feature-check { color: var(--green); font-weight: 900; }
    .feature-cross { color: #ccc; font-weight: 900; }

    .btn-purchase {
      width: 100%; padding: 16px; border-radius: 12px; border: none;
      font-family: inherit; font-size: 15px; font-weight: 800; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-purchase-primary { background: var(--green); color: #fff; box-shadow: 0 6px 20px var(--green-glow); }
    .btn-purchase-primary:hover { background: var(--green-light); transform: translateY(-2px); }
    .btn-purchase-outline { background: transparent; border: 2.5px solid var(--green); color: var(--green); }
    .btn-purchase-outline:hover { background: var(--green-pale); }
    .btn-purchase-disabled {
      background: #e5e7eb; color: #9ca3af; cursor: not-allowed;
      border: 2px solid #e5e7eb;
    }
    .btn-purchase-disabled:hover { transform: none; }

    /* Modal */
    .modal {
        display: none; position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content {
        background: #fff; border-radius: 20px; width: 100%; max-width: 440px;
        padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-header { margin-bottom: 8px; text-align: center; }
    .modal-title { font-size: 24px; font-weight: 800; color: var(--dark); }
    .modal-plan-info { text-align: center; margin-bottom: 20px; font-size: 14px; color: var(--muted); }
    .modal-price-display {
        background: var(--green-pale); border: 1.5px solid var(--green); border-radius: 12px;
        padding: 14px 20px; margin-bottom: 20px; text-align: center;
    }
    .modal-price-original { font-size: 13px; color: var(--muted); text-decoration: line-through; }
    .modal-price-effective { font-size: 22px; font-weight: 900; color: var(--green); }
    .modal-price-discount { font-size: 12px; color: var(--green); font-weight: 600; }
    .modal-options { display: flex; flex-direction: column; gap: 12px; }
    .payment-option {
        display: flex; align-items: center; gap: 16px; padding: 18px;
        border: 2px solid var(--border); border-radius: 14px; cursor: pointer;
        transition: all 0.2s;
    }
    .payment-option:hover { border-color: var(--green); background: var(--green-pale); }
    .payment-option.active { border-color: var(--green); background: var(--green-pale); box-shadow: 0 0 0 2px var(--green); }
    .payment-icon { width: 44px; height: 44px; object-fit: contain; border-radius: 8px; }
    .payment-text { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .payment-name { font-weight: 700; color: var(--dark); font-size: 16px; }
    .payment-desc { font-size: 12px; color: var(--muted); }
    .wallet-balance-badge {
        background: var(--green); color: #fff; font-size: 11px; font-weight: 700;
        padding: 3px 8px; border-radius: 20px; white-space: nowrap;
    }
    .wallet-insufficient { opacity: 0.5; cursor: not-allowed !important; }
    .wallet-insufficient:hover { border-color: var(--border) !important; background: transparent !important; box-shadow: none !important; }
    
    .modal-footer { margin-top: 24px; display: flex; gap: 12px; }
    .btn-confirm { flex: 2; }
    .btn-cancel { flex: 1; background: #eee; color: var(--muted); }

    @media (max-width: 768px) {
      .plans-grid { grid-template-columns: 1fr; }
      .plan-card.popular { transform: none; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="membership-page">
    <div class="page-header">
      <h1 class="page-title">Nâng Cấp Trải Nghiệm Cùng <em>Hội Viên</em></h1>
      <p class="page-sub">
        Lựa chọn gói hội viên phù hợp để nhận ngay các ưu đãi đặc quyền, giảm giá đặt sân và tích điểm đổi quà hấp dẫn.
      </p>
    </div>

    <div class="plans-grid" id="plansGrid">
      <!-- Rendered by JS -->
      <div class="skeleton" style="height:500px"></div>
      <div class="skeleton" style="height:500px"></div>
      <div class="skeleton" style="height:500px"></div>
    </div>
  </main>

  <!-- Payment Modal -->
  <div class="modal" id="paymentModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Chọn Phương Thức Thanh Toán</h3>
      </div>
      <div class="modal-plan-info" id="modalPlanInfo"></div>
      <div class="modal-price-display" id="modalPriceDisplay" style="display:none">
        <div class="modal-price-original" id="modalOriginalPrice"></div>
        <div class="modal-price-effective" id="modalEffectivePrice"></div>
        <div class="modal-price-discount" id="modalDiscount"></div>
      </div>
      <div class="modal-options">
        <div class="payment-option active" id="optMomo" data-method="momo">
            <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" class="payment-icon" alt="Momo">
            <div class="payment-text">
                <span class="payment-name">Ví MoMo</span>
                <span class="payment-desc">Thanh toán qua ứng dụng MoMo</span>
            </div>
        </div>
        <div class="payment-option" id="optWallet" data-method="wallet">
            <div class="payment-icon" style="background:linear-gradient(135deg,#16a34a,#22c55e);display:flex;align-items:center;justify-content:center;font-size:22px;"></div>
            <div class="payment-text">
                <span class="payment-name">Ví Cầu Lông Vui</span>
                <span class="payment-desc" id="walletBalanceDesc">Đang tải số dư...</span>
            </div>
            <span class="wallet-balance-badge" id="walletBadge"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-purchase btn-cancel" onclick="closeModal()">Hủy</button>
        <button class="btn-purchase btn-purchase-primary btn-confirm" id="confirmBtn" onclick="processPurchase()">Thanh Toán Ngay</button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/js/app.js"></script>
  <script>
    let selectedPlanId = null;
    let selectedMethod = 'momo';
    let effectivePriceCache = null;
    let walletBalance = 0;

    // Tier hierarchy for comparison
    const TIER_ORDER = { 'NORMAL': 0, 'PRO': 1, 'VIP': 2 };

    async function loadPlans() {
      const grid = document.getElementById('plansGrid');
      const user = getCurrentUser();
      const userTier = user ? (user.membershipTier || 'NORMAL') : 'NORMAL';
      const tierOrdinal = TIER_ORDER[userTier] ?? 0;

      // Load wallet balance nếu đã đăng nhập
      if (user) {
        try {
          const walletData = await fetchAPI('/wallet/' + user.id);
          walletBalance = walletData.balance || 0;
        } catch(e) { walletBalance = 0; }
      }

      try {
        const plans = await fetchAPI('/membership/plans');
        
        const featureMap = {
          'NORMAL': [
            ['Ưu tiên đặt sân cơ bản', true],
            ['Tích điểm đổi quà', true],
            ['Hỗ trợ khách hàng 24/7', true],
            ['Giảm giá đặt sân theo giờ', false],
            ['Dịch vụ phòng chờ VIP', false]
          ],
          'PRO': [
            ['Ưu tiên đặt sân cấp 2', true],
            ['Tích điểm X2', true],
            ['Giảm giá đặt sân 10%', true],
            ['Hỗ trợ chăm sóc đặc biệt', true],
            ['Dịch vụ phòng chờ VIP', false]
          ],
          'VIP': [
            ['Ưu tiên đặt sân cao nhất', true],
            ['Tích điểm X5', true],
            ['Giảm giá đặt sân 20%', true],
            ['Giao hàng miễn phí', true],
            ['Phòng chờ VIP & Nước uống miễn phí', true]
          ]
        };

        grid.innerHTML = plans.map(plan => {
          const isPopular = plan.tier === 'PRO';
          const features = featureMap[plan.tier] || [];
          const planOrdinal = TIER_ORDER[plan.tier] ?? 0;

          // Xác định trạng thái nút
          let btnClass, btnLabel, btnDisabled, tagHtml;

          if (plan.tier === 'NORMAL') {
            // Gói thường: luôn disable, chỉ để xem
            btnClass = 'btn-purchase-disabled';
            btnLabel = 'Gói mặc định';
            btnDisabled = true;
            tagHtml = '';
          } else if (planOrdinal < tierOrdinal) {
            // Gói thấp hơn tier hiện tại
            btnClass = 'btn-purchase-disabled';
            btnLabel = 'Không thể hạ cấp';
            btnDisabled = true;
            tagHtml = '';
          } else if (planOrdinal === tierOrdinal) {
            // Gói đang dùng
            btnClass = 'btn-purchase-disabled';
            btnLabel = '✓ Đang sử dụng';
            btnDisabled = true;
            tagHtml = '<div class="current-tag">Đang dùng</div>';
          } else {
            // Gói cao hơn — có thể mua
            if (isPopular) {
              btnClass = 'btn-purchase-primary';
              btnLabel = tierOrdinal > 0 ? '⬆ Nâng cấp ngay' : 'Mua gói ngay';
              tagHtml = '<div class="popular-tag">Phổ biến nhất</div>';
            } else {
              btnClass = 'btn-purchase-outline';
              btnLabel = 'Mua gói ngay';
              tagHtml = '';
            }
            btnDisabled = false;
          }

          const cardClass = planOrdinal === tierOrdinal ? 'plan-card current-plan' : (isPopular ? 'plan-card popular' : 'plan-card');
          const onclickAttr = btnDisabled ? '' : `onclick="openPaymentModal(${plan.id}, '${plan.name}', ${plan.price})"`;

          return `
            <div class="${cardClass}">
              ${tagHtml}
              <span class="plan-tier">${plan.tier}</span>
              <h3 class="plan-name">${plan.name}</h3>
              <div class="plan-price">
                <span class="price-val">${formatCurrency(plan.price).replace('₫', '')}</span>
                <span class="price-unit">₫ / ${plan.durationInDays} ngày</span>
              </div>
              <ul class="plan-features">
                ${features.map(f => `
                  <li>
                    <span class="${f[1] ? 'feature-check' : 'feature-cross'}">${f[1] ? '✓' : '✕'}</span>
                    ${f[0]}
                  </li>
                `).join('')}
              </ul>
              <button class="btn-purchase ${btnClass}" ${btnDisabled ? 'disabled' : ''} ${onclickAttr}>
                ${btnLabel}
              </button>
            </div>
          `;
        }).join('');
      } catch (err) {
        showToast('Không thể tải danh sách gói: ' + err.message, 'error');
      }
    }

    async function openPaymentModal(planId, planName, originalPrice) {
      if (!requireAuth()) return;
      const user = getCurrentUser();
      selectedPlanId = planId;
      selectedMethod = 'momo';
      effectivePriceCache = null;

      // Reset về momo active
      document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
      document.getElementById('optMomo').classList.add('active');

      // Hiển thị thông tin gói
      document.getElementById('modalPlanInfo').textContent = planName;

      // Cập nhật số dư ví
      const walletBadge = document.getElementById('walletBadge');
      const walletDesc = document.getElementById('walletBalanceDesc');
      walletBadge.textContent = formatCurrency(walletBalance);
      walletDesc.textContent = 'Số dư: ' + formatCurrency(walletBalance);

      // Gọi API tính giá thực tế
      try {
        const costData = await fetchAPI(`/membership/upgrade-cost?planId=${planId}&userId=${user.id}`);
        effectivePriceCache = costData.effectivePrice;
        const discount = costData.discount;

        const priceDisplay = document.getElementById('modalPriceDisplay');
        if (discount > 0) {
          document.getElementById('modalOriginalPrice').textContent = 'Giá gốc: ' + formatCurrency(originalPrice);
          document.getElementById('modalEffectivePrice').textContent = formatCurrency(effectivePriceCache);
          document.getElementById('modalDiscount').textContent = 'Được khấu trừ ' + formatCurrency(discount) + ' từ gói hiện tại';
          priceDisplay.style.display = 'block';
        } else {
          priceDisplay.style.display = 'none';
        }

        // Kiểm tra số dư ví có đủ không
        const walletOpt = document.getElementById('optWallet');
        if (walletBalance < effectivePriceCache) {
          walletOpt.classList.add('wallet-insufficient');
          walletDesc.textContent = `Không đủ số dư (cần ${formatCurrency(effectivePriceCache)})`;
        } else {
          walletOpt.classList.remove('wallet-insufficient');
        }
      } catch(e) {
        effectivePriceCache = originalPrice;
        document.getElementById('modalPriceDisplay').style.display = 'none';
      }

      document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('paymentModal').style.display = 'none';
      selectedPlanId = null;
    }

    // Modal option selection
    document.querySelectorAll('.payment-option').forEach(opt => {
        opt.addEventListener('click', () => {
            if (opt.classList.contains('wallet-insufficient')) return; // Không cho chọn nếu không đủ tiền
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            selectedMethod = opt.dataset.method;
        });
    });

    async function processPurchase() {
      const user = getCurrentUser();
      const btn = document.getElementById('confirmBtn');
      btn.disabled = true;
      btn.textContent = 'Đang xử lý...';

      try {
        const res = await fetch(`${API_BASE}/membership/purchase/${selectedPlanId}?userId=${user.id}&method=${selectedMethod}`, {
          method: 'POST'
        });
        
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'Lỗi thanh toán');

        if (json.data && json.data.success) {
          // Thanh toán ví thành công → không redirect
          closeModal();
          showToast('Thanh toán thành công! Gói hội viên đã được kích hoạt.', 'success');
          setTimeout(() => window.location.reload(), 1500);
        } else if (json.data && json.data.paymentUrl) {
          window.location.href = json.data.paymentUrl;
        } else {
          throw new Error(json.message || 'Lỗi thanh toán');
        }
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Thanh Toán Ngay';
      }
    }

    document.addEventListener('DOMContentLoaded', loadPlans);
  </script>
</body>
</html>
