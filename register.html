<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>Đăng ký - Cầu Lông Vui</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5cb85c;
            --primary-hover: #4cae4c;
            --dark: #121212;
            --light: #f5f5f5;
            --text-main: #333333;
            --border-color: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
            position: relative;
            z-index: 1;
            margin: 20px;
        }

        /* Decorative background elements */
        .blob {
            position: absolute;
            background: var(--primary);
            filter: blur(90px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 0;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }

        .logo span {
            color: var(--dark);
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header h2 {
            font-size: 24px;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(92, 184, 92, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(92, 184, 92, 0.3);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            background-color: var(--primary-hover);
            box-shadow: 0 15px 25px rgba(92, 184, 92, 0.4);
        }

        .btn-submit:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #f87171;
        }

        .alert-success {
            background-color: #dcfce7;
            color: #16a34a;
            border: 1px solid #86efac;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <div class="logo-container">
            <a href="../index.html" class="logo">🏸 Cầu Lông <span>Vui</span></a>
        </div>

        <div class="login-header">
            <h2>Đăng ký tài khoản</h2>
            <p>Tham gia cùng chúng tôi ngay hôm nay</p>
        </div>

        <div id="alertMessage" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên đầy đủ" required>
            </div>

            <div class="form-group">
                <label for="email">Tài khoản Email</label>
                <input type="email" id="email" class="form-control" placeholder="Nhập email của bạn" required>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" class="form-control" placeholder="Nhập số điện thoại (ví dụ: 0912345678)" required pattern="^[0-9]{9,11}$" title="Số điện thoại phải từ 9 đến 11 số">
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="Tạo mật khẩu (ít nhất 6 ký tự)" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu" required minlength="6">
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">Đăng ký</button>
        </form>

        <div class="form-footer">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            
            // Basic validation
            if (password !== confirmPassword) {
                showAlert('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }

            try {
                // Disable button and show loading state
                submitBtn.disabled = true;
                submitBtn.textContent = 'Đang xử lý...';
                
                // Gọi API backend
                const response = await fetch('http://localhost:8080/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        fullName: fullName,
                        email: email,
                        phone: phone,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Đăng ký thành công! Đang chuyển hướng đến trang đăng nhập...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    // Hiển thị lỗi từ backend
                    showAlert(data.message || 'Đăng ký thất bại. Vui lòng thử lại.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Đăng ký';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Đăng ký';
            }
        });

        function showAlert(message, type) {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = message;
            alertEl.style.display = 'block';
            
            if (type === 'error') {
                alertEl.className = 'alert alert-error';
            } else {
                alertEl.className = 'alert alert-success';
            }
        }
    </script>
</body>

</html>
